name: howtoob
region: nyc

services:
  - name: web
    github:
      repo: loraencb/HowToob
      branch: vinny-frontend-ui
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    envs:
      - key: HOST
        value: "0.0.0.0"
        scope: RUN_TIME
        type: GENERAL
      - key: PORT
        value: "8080"
        scope: RUN_TIME
        type: GENERAL
      - key: DEBUG
        value: "false"
        scope: RUN_TIME
        type: GENERAL
      - key: SECRET_KEY
        value: "replace-this-in-digitalocean"
        scope: RUN_TIME
        type: SECRET
      - key: DATABASE_URL
        value: "${howtoob-db.DATABASE_URL}"
        scope: RUN_TIME
        type: GENERAL
      - key: SERVE_FRONTEND_BUILD
        value: "true"
        scope: RUN_TIME
        type: GENERAL
      - key: FRONTEND_DIST_DIR
        value: "/app/frontend/dist"
        scope: RUN_TIME
        type: GENERAL
      - key: CORS_ALLOW_ALL_DEV
        value: "false"
        scope: RUN_TIME
        type: GENERAL
      - key: SESSION_COOKIE_SECURE
        value: "true"
        scope: RUN_TIME
        type: GENERAL
      - key: SESSION_COOKIE_SAMESITE
        value: "Lax"
        scope: RUN_TIME
        type: GENERAL
      - key: OPENAI_API_KEY
        value: "replace-this-in-digitalocean"
        scope: RUN_TIME
        type: SECRET
      - key: OPENAI_API_BASE_URL
        value: "https://api.openai.com/v1"
        scope: RUN_TIME
        type: GENERAL
      - key: OPENAI_TRANSCRIPTION_MODEL
        value: "gpt-4o-mini-transcribe"
        scope: RUN_TIME
        type: GENERAL
      - key: OPENAI_QUIZ_MODEL
        value: "gpt-4o-mini"
        scope: RUN_TIME
        type: GENERAL
      - key: QUIZ_AI_DEFAULT_QUESTION_COUNT
        value: "10"
        scope: RUN_TIME
        type: GENERAL
      - key: QUIZ_AI_AUTO_GENERATE_ON_UPLOAD
        value: "true"
        scope: RUN_TIME
        type: GENERAL
      - key: QUIZ_AI_AUTO_GENERATE_QUESTION_COUNT
        value: "10"
        scope: RUN_TIME
        type: GENERAL
      - key: QUIZ_AI_FFMPEG_BINARY
        value: "ffmpeg"
        scope: RUN_TIME
        type: GENERAL

databases:
  - name: howtoob-db
    engine: PG
    version: "16"

ingress:
  rules:
    - match:
        path:
          prefix: /
      component:
        name: web
